<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Marquee — 无限滚动</title>
<style>
/*
 * 来源: landonorris.com (OFF+BRAND) / zentry.com (Resn)
 * 两种实现: CSS @keyframes (轻量) / GSAP xPercent (灵活)
 *
 * DESIGN RATIONALE:
 * - 无限循环创造"持续在场"感 —— logo 墙很适合在页面底部持续滚动
 * - 首尾无缝需要精确 100% 宽度对应 —— 内容宽度 = 容器宽度时正好循环
 * - 左右两个方向同时滚动创造"十字路口"的层次感
 *
 * DECISION: CSS 方案 vs GSAP 方案
 * - CSS: 不需要 JS，适合简单 logo 墙（<20 个元素），不能 hover 暂停
 * - GSAP: 可 hover 暂停，灵活控制速度，适合内容可交互的场景
 * - 这里两种都展示，GSAP 使用本地 vendor 文件
 */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f; font-family: system-ui, sans-serif;
  display: grid; place-items: center; min-height: 100vh;
}

.marquee-demo { width: 100%; max-width: 800px; margin-bottom: 48px; }
.marquee-demo h3 { color: #fff; font-size: 14px; font-weight: 400; opacity: 0.4; margin-bottom: 16px; }

.marquee {
  overflow: hidden;
  white-space: nowrap;
  mask-image: linear-gradient(90deg, transparent 0%, white 5%, white 95%, transparent 100%);
  -webkit-mask-image: linear-gradient(90deg, transparent 0%, white 5%, white 95%, transparent 100%);
}

/* CSS 版本 */
.css-marquee__inner {
  display: inline-flex;
  gap: 64px;
  animation: marqueeLeft 20s linear infinite;
  padding: 16px 0;
}
.css-marquee__inner:hover { animation-play-state: paused; }
.css-marquee__inner span {
  color: rgba(255,255,255,0.3);
  font-size: 15px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: color 0.3s;
}
.css-marquee__inner span:hover { color: rgba(255,255,255,0.8); }

@keyframes marqueeLeft {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes marqueeRight {
  0% { transform: translateX(-50%); }
  100% { transform: translateX(0); }
}
.css-marquee__inner--right { animation-name: marqueeRight; }

/* GSAP 版本 */
.gsap-marquee__track {
  display: inline-flex;
  gap: 48px;
  padding: 16px 32px;
  will-change: transform;
}
.gsap-marquee__track span {
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  white-space: nowrap;
  letter-spacing: 0.03em;
}

/* 调参: 速度 20s=从容 12s=活泼 30s=优雅 */
</style>
</head>
<body>
<div style="width:100%;padding:24px;max-width:800px">
  <div class="marquee-demo">
    <h3>CSS @keyframes · hover 暂停</h3>
    <div class="marquee">
      <div class="css-marquee__inner">
        <span>Product</span><span>·</span><span>Design</span><span>·</span><span>Engineering</span><span>·</span><span>Strategy</span><span>·</span><span>Innovation</span><span>·</span>
        <span>Product</span><span>·</span><span>Design</span><span>·</span><span>Engineering</span><span>·</span><span>Strategy</span><span>·</span><span>Innovation</span><span>·</span>
      </div>
    </div>
  </div>

  <div class="marquee-demo">
    <h3>GSAP xPercent · hover 暂停（更平滑）</h3>
    <div class="marquee" id="gsapMarquee">
      <div class="gsap-marquee__track" id="marqueeTrack">
        <span>Zentry</span><span style="opacity:0.2">×</span><span>Resn</span><span style="opacity:0.2">×</span><span>Lusion</span><span style="opacity:0.2">×</span><span>OFF+BRAND</span><span style="opacity:0.2">×</span><span>Media.Monks</span>
      </div>
    </div>
  </div>
</div>

<script src="vendor/gsap.min.js"></script>
<script>
// GSAP 版 — zentry 风格，timeScale 实现无缝 hover 暂停
const track = document.getElementById('marqueeTrack')
track.innerHTML += track.innerHTML // clone 实现无缝循环

const tween = gsap.to(track, {
  xPercent: -50,
  repeat: -1,
  duration: 30,
  ease: 'none',
})

const container = document.getElementById('gsapMarquee')
container.addEventListener('mouseenter', () => tween.timeScale(0))
container.addEventListener('mouseleave', () => tween.timeScale(1))
</script>
</body>
</html>
