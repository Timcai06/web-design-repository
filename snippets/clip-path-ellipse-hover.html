<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip-Path Ellipse Hover Reveal</title>
<style>
/* ====== 来源: landonorris.com (OFF+BRAND) ====== */
/* 纯 CSS hover 揭示，零 JavaScript */

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: grid; place-items: center; min-height: 100vh;
  background: #1a1a1a; font-family: system-ui, sans-serif;
}

/* ====== 核心组件 ====== */
.reveal-card {
  position: relative;
  width: 320px;
  height: 320px;
  overflow: hidden;
  border-radius: 12px;
  cursor: pointer;
}

.reveal-card__base {
  display: block;
  width: 100%;
  height: 100%;
}

.reveal-card__base .bg {
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: rgba(255,255,255,0.8);
}

.reveal-card__overlay {
  position: absolute;
  inset: 0;
  /* === 核心: clip-path ellipse 从顶部展开 === */
  clip-path: ellipse(0% 0% at 50% 0%);
  transition: clip-path 0.75s cubic-bezier(0.65, 0.05, 0, 1);
  /* landonorris 用的 easing: 从容、优雅、品牌感 */
}

.reveal-card__overlay .bg {
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: rgba(255,255,255,0.9);
}

.reveal-card:hover .reveal-card__overlay {
  /* 120% 让椭圆超出底部，视觉更饱满 */
  clip-path: ellipse(120% 120% at 50% 0%);
}

/* ====== 调参指南 ====== */
/* 电商:   duration 0.4s, easing: cubic-bezier(0.4, 0, 0.2, 1) */
/* 品牌:   duration 0.75s, easing: cubic-bezier(0.65, 0.05, 0, 1) */
/* 奢侈:   duration 1.2s, easing: cubic-bezier(0.8, 0.2, 0.5, 1) */
/* 活泼:   clip-path: circle(0% at 50% 50%) → circle(100% at 50% 50%) */
/* 优雅:   clip-path: inset(50% 0% 50% 0%) → inset(0% 0% 0% 0%) */

/* ====== 演示装饰 ====== */
.demo-label {
  text-align: center; color: #fff; margin-bottom: 24px;
}
.demo-label h1 { font-size: 20px; margin-bottom: 8px; }
.demo-label p { font-size: 14px; opacity: 0.6; }
.demo-grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<div>
  <div class="demo-label">
    <h1>Clip-Path Ellipse Hover</h1>
    <p>来源: landonorris.com · 纯 CSS · 零 JS · 渐变占位图</p>
  </div>
  <div class="demo-grid">
    <div class="reveal-card">
      <div class="reveal-card__base">
        <div class="bg" style="background: linear-gradient(135deg, #2d3436, #636e72);">BASE A</div>
      </div>
      <div class="reveal-card__overlay">
        <div class="bg" style="background: linear-gradient(135deg, #e17055, #d63031);">OVERLAY A</div>
      </div>
    </div>
    <div class="reveal-card">
      <div class="reveal-card__base">
        <div class="bg" style="background: linear-gradient(135deg, #1a1a2e, #16213e);">BASE B</div>
      </div>
      <div class="reveal-card__overlay">
        <div class="bg" style="background: linear-gradient(135deg, #0f3460, #533483);">OVERLAY B</div>
      </div>
    </div>
    <div class="reveal-card">
      <div class="reveal-card__base">
        <div class="bg" style="background: linear-gradient(135deg, #2b2b2b, #4a4a4a);">BASE C</div>
      </div>
      <div class="reveal-card__overlay">
        <div class="bg" style="background: linear-gradient(135deg, #006064, #00838f);">OVERLAY C</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
