<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll-Driven Grip Zoom + Blur</title>
<style>
/* ====== 来源: oryzo.ai (Lusion) ====== */
/* 滚动驱动 scale(1→1.3) + blur(4px→0)，模拟镜头对焦 */

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f5f0;
  font-family: system-ui, sans-serif;
  color: #1a1a1a;
}

/* ====== 演示用 spacer ====== */
.spacer {
  height: 100vh;
  display: grid;
  place-items: center;
  font-size: 14px;
  opacity: 0.3;
}

/* ====== 核心区域 ====== */
.grip-section {
  height: 200vh;  /* 提供滚动空间 */
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.grip-sticky {
  position: sticky;
  top: 10vh;
  height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
}

.grip-content {
  width: 300px;
  height: 300px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 24px;
  /* === 核心: 初始状态 === */
  transform: scale(1.0);
  filter: blur(4px);
  will-change: transform, filter;
  transition: none; /* GSAP/js 驱动 */
  display: grid;
  place-items: center;
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
}

.grip-label {
  font-size: 14px;
  opacity: 0.4;
  transition: opacity 0.3s;
}

/* ====== 进度指示 ====== */
.progress-bar {
  position: fixed;
  top: 0; left: 0; height: 2px;
  background: #667eea;
  width: 0%;
  transition: width 0.1s linear;
  z-index: 100;
}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<div class="spacer">↓ scroll down ↓</div>

<section class="grip-section" id="gripSection">
  <div class="grip-sticky">
    <div class="grip-content" id="gripContent">
      <div>
        <div style="font-size:36px;margin-bottom:8px">🔍</div>
        <div>从模糊到清晰</div>
        <div style="font-size:13px;font-weight:400;opacity:0.7;margin-top:8px">滚动控制缩放 + 对焦</div>
      </div>
    </div>
    <div class="grip-label" id="gripLabel">滚动放大查看细节</div>
  </div>
</section>

<div class="spacer">end</div>

<script>
// ====== Scroll-Driven Zoom + Blur ======
// 纯 JS 实现，无需 GSAP。原理: 监听 scroll → 计算 progress → 映射 scale + blur

function initGripZoom(sectionId, contentId, labelId) {
  const section = document.getElementById(sectionId);
  const content = document.getElementById(contentId);
  const label = document.getElementById(labelId);
  const progressBar = document.getElementById('progressBar');

  function update() {
    const rect = section.getBoundingClientRect();
    const viewportH = window.innerHeight;

    // 计算 section 在视口中的可见进度
    // 0 = section 底部刚进入视口
    // 1 = section 顶部到达视口底部（section 即将完全滚出）
    const sectionTop = rect.top;
    const sectionHeight = rect.height;
    const totalScrollDist = sectionHeight + viewportH; // section 从进入 → 离开的总滚动距离
    const scrolled = viewportH - sectionTop; // 已滚动量

    let progress = scrolled / totalScrollDist;
    progress = Math.max(0, Math.min(1, progress));

    // === 核心映射 ===
    // scale: 1.0 → 1.3
    // blur:  4px → 0px
    const scale = 1.0 + progress * 0.3;
    const blur = 4 * (1 - progress);

    content.style.transform = `scale(${scale})`;
    content.style.filter = `blur(${blur}px)`;

    // 标签更新
    if (label) {
      const zoomPercent = Math.round(progress * 30);
      const blurPercent = Math.round((1 - progress) * 100);
      label.textContent = `+${zoomPercent}% zoom · ${blurPercent}% blur`;
    }

    progressBar.style.width = `${progress * 100}%`;
  }

  window.addEventListener('scroll', update, { passive: true });
  update(); // 初始
}

initGripZoom('gripSection', 'gripContent', 'gripLabel');
</script>
</body>
</html>
