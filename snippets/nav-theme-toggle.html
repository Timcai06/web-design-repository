<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nav Theme Toggle — 滚动驱动主题切换</title>
<style>
/*
 * 来源: landonorris.com (OFF+BRAND)
 *
 * DESIGN RATIONALE:
 * - 深色 Hero → 浅色内容 → 深色 Footer：导航颜色必须适配背景
 * - 用空 div 做触发器：最简单、最解耦的方式
 * - transition 0.4s：足够快到不延迟视觉，足够慢到不突兀
 *
 * DECISION: 为什么用空 div 触发器而不是 JS 计算背景色？
 * - 背景可能是渐变色/图片/3D → 自动检测亮度复杂而不可靠
 * - 设计师在特定位置放置触发器 = 精确控制切换时机
 * - 不依赖 JS 计算 → 性能更好，实现更简单
 *
 * 适合: 有多个不同亮度 section 的滚动页面
 * 不适合: 所有 section 亮度相近的页面
 */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui; }

/* ====== 导航 ====== */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 20px 32px;
  display: flex; justify-content: space-between; align-items: center;
  /* 默认: 浅色（适配深色 Hero） */
  color: #fff;
  background: transparent;
  transition: color 0.4s ease, background 0.4s ease;
  mix-blend-mode: difference;
}

nav.light {
  /* 浅色背景上: 改为深色 */
  color: #1a1a1a;
  background: rgba(255,255,255,0.9);
  mix-blend-mode: normal;
  backdrop-filter: blur(8px);
}

nav .logo {
  font-size: 14px; font-weight: 600; letter-spacing: 0.1em;
}
nav .links { display: flex; gap: 20px; font-size: 13px; }
nav .links a { color: inherit; text-decoration: none; opacity: 0.6; transition: opacity 0.3s; }
nav .links a:hover { opacity: 1; }

/* ====== Sections ====== */
.section { height: 100vh; display: grid; place-items: center; }
.section h2 { font-size: 24px; font-weight: 300; letter-spacing: 0.05em; }
.section p { font-size: 13px; opacity: 0.4; margin-top: 8px; }

.hero { background: #0a0a0f; color: #fff; }
.content-1 { background: #f5f5f0; color: #1a1a1a; }
.content-2 { background: #e8e8e0; color: #1a1a1a; }
.footer { background: #0a0a0f; color: #fff; }

/* ====== 触发器（空 div，只在特定位置） ====== */
.theme-trigger {
  position: absolute;
  /* 放在 content-1 顶部偏移处，让导航在实际进入浅色区之前就切换 */
  top: -100px;
  height: 1px;
  width: 100%;
  pointer-events: none;
}

.demo-label {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  font-size: 12px; opacity: 0.3; z-index: 200;
}
</style>
</head>
<body>

<nav id="nav">
  <div class="logo">◈ BRAND</div>
  <div class="links">
    <a href="#">Work</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<div class="demo-label">scroll — 导航在浅色区域自动变深</div>

<section class="section hero" style="position:relative">
  <div><h2>Dark Hero</h2><p>导航为白色 (mix-blend-mode: difference)</p></div>
</section>

<section class="section content-1" style="position:relative">
  <div class="theme-trigger" id="trigger1"></div>
  <div><h2>Light Content</h2><p>导航切换为深色 + 毛玻璃背景</p></div>
</section>

<section class="section content-2" style="position:relative">
  <div><h2>More Content</h2><p>导航保持深色</p></div>
</section>

<section class="section footer" style="position:relative">
  <div class="theme-trigger" id="trigger2"></div>
  <div><h2>Footer</h2><p>导航回到白色</p></div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
// ====== ScrollTrigger 主题切换 ======
gsap.registerPlugin(ScrollTrigger)

const nav = document.getElementById('nav')

// 进入浅色区 → 导航变深
ScrollTrigger.create({
  trigger: '#trigger1',
  start: 'top center',
  onEnter: () => nav.classList.add('light'),
  onLeaveBack: () => nav.classList.remove('light'),
})

// 回到深色区 → 导航变白
ScrollTrigger.create({
  trigger: '#trigger2',
  start: 'top center',
  onEnter: () => nav.classList.remove('light'),
  onLeaveBack: () => nav.classList.add('light'),
})
</script>
</body>
</html>
